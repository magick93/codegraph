# hr-graph Profile Configuration
#
# Each profile declares one or more project output sections ([api], [ui],
# [cli]) with generator names and optional post-generation scripts.
#
# Profiles:
#   default    — all artifacts (backward-compatible with pre-profile pipeline)
#   api        — API-only: server, OpenAPI, DB, domain types
#   ui         — UI-only: SvelteKit routes, forms, stores, scaffold
#   cli        — CLI-only: command scaffolding
#   fullstack  — API + UI combined
#   ci         — compile-gate: everything, compile-check only

# ─── default (all artifacts) ─────────────────────────────────────────────────
[profiles.default.meta]
name = "default"
version = "1.0.0"
description = "All artifacts — mirrors the pre-profile pipeline"
authors = ["hr-graph team"]
since = "2026-05-08"

[profiles.default.features]
auth = true
pagination = true
validation_level = "strict"
offline_mode = false
ifml_backend = true

[profiles.default.api]
generators = [
    # Entity
    "ddl", "sea_orm_entity", "codelist", "dto", "repository", "command",
    "query", "event", "handler", "workflow_action", "media_route", "test",
    "lifecycle_trait", "domain_types_dto", "domain_types_query_service",
    # Domain
    "router", "links",
    # Global
    "openapi", "scaffold", "basejump_setup", "pgmq_setup",
    "platform_schema", "workflow_seed", "hook_registry", "domain_types_scaffold",
    "report_views",
    "webhook_dispatch", "webhook_endpoint_api",
]
output = "review/generated-candidate/"
scripts.post_gen = ["cargo check -p hr-domain-types -p hr-hooks-api 2>&1"]

[profiles.default.ui]
generators = [
    # Entity
    "ui_page", "ui_form", "ui_store", "ui_e2e_test",
    "playwright-entity", "ui_descriptor", "ui-shell",
    # Domain
    "ui-domain-layout",
    # Global
    "ui_scaffold", "ui_types", "ui_codelist", "ui_orgchart", "playwright-global",
    # IFML
    "ifml_route", "ifml_navigation",
]
output = "review/generated-candidate/"
scripts.post_gen = []

[profiles.default.cli]
generators = ["cli_command", "cli_domain", "cli_scaffold"]
output = "review/generated-candidate/"
scripts.post_gen = []


