syntax = "proto3";
package common;

import "google/protobuf/timestamp.proto";

import "shared.proto";
option go_package = "common/;common";




/// ProcessHistoryItem entity
message ProcessHistoryItem {
  
    // Unique identifier (UUID)
  string id = 1;
  
    // The date the action was executed.
  optional google.protobuf.Timestamp actionDate = 2;
  
    // Additional details about the history item.
  repeated string descriptions = 3;
  
    // The identifier for the history item.
  optional string id = 4;
  
    // Creation timestamp
  optional google.protobuf.Timestamp created_at = 998;
  
    // Last update timestamp
  optional google.protobuf.Timestamp updated_at = 999;
  
}

/// Create request for ProcessHistoryItem
message CreateProcessHistoryItemRequest {
  
    // The date the action was executed.
  optional google.protobuf.Timestamp actionDate = 2;
  
    // Additional details about the history item.
  repeated string descriptions = 3;
  
}

/// Update request for ProcessHistoryItem
message UpdateProcessHistoryItemRequest {
  
    // Unique identifier (UUID)
  string id = 1;
  
    // The date the action was executed.
  optional google.protobuf.Timestamp actionDate = 2;
  
    // Additional details about the history item.
  repeated string descriptions = 3;
  
    // The identifier for the history item.
  optional string id = 4;
  
}

/// Get request for ProcessHistoryItem
message GetProcessHistoryItemRequest {
  
    // Entity UUID
  string id = 1;
  
}

/// Delete request for ProcessHistoryItem
message DeleteProcessHistoryItemRequest {
  
    // Entity UUID
  string id = 1;
  
}

/// List request for ProcessHistoryItem
message ListProcessHistoryItemRequest {
  
    // Number of items per page
  optional int32 page_size = 1;
  
    // Pagination token
  optional string page_token = 2;
  
    // Additional field filters
  repeated FilterClause filters = 5;
  
}

/// List response for ProcessHistoryItem
message ListProcessHistoryItemResponse {
  
  
  repeated ProcessHistoryItem data = 1;
  
    // Total number of items
  int32 total = 2;
  
    // Pagination token for next page
  optional string next_page_token = 3;
  
}



// ── ProcessHistoryItem Service ──────────────────────────────────────────
service ProcessHistoryItemService {
  
  // Create a new entity
  rpc Create(CreateProcessHistoryItemRequest) returns (ProcessHistoryItem);
  
  // Get an entity by ID
  rpc Get(GetProcessHistoryItemRequest) returns (ProcessHistoryItem);
  
  // Update an existing entity
  rpc Update(UpdateProcessHistoryItemRequest) returns (ProcessHistoryItem);
  
  // Delete an entity by ID
  rpc Delete(DeleteProcessHistoryItemRequest) returns (google.protobuf.Empty);
  
  // List entities with pagination
  rpc List(ListProcessHistoryItemRequest) returns (ListProcessHistoryItemResponse);
  
}
