syntax = "proto3";
package common;

import "google/protobuf/timestamp.proto";

import "shared.proto";
option go_package = "common/;common";




/// Identifier entity
message Identifier {
  
    // Unique identifier (UUID)
  string id = 1;
  
  
  optional string schemeAgencyId = 2;
  
  
  optional string schemeId = 3;
  
  
  optional string schemeVersionId = 4;
  
  
  string value = 5;
  
    // Creation timestamp
  optional google.protobuf.Timestamp created_at = 998;
  
    // Last update timestamp
  optional google.protobuf.Timestamp updated_at = 999;
  
}

/// Create request for Identifier
message CreateIdentifierRequest {
  
  
  optional string schemeAgencyId = 2;
  
  
  optional string schemeId = 3;
  
  
  optional string schemeVersionId = 4;
  
  
  string value = 5;
  
}

/// Update request for Identifier
message UpdateIdentifierRequest {
  
    // Unique identifier (UUID)
  string id = 1;
  
  
  optional string schemeAgencyId = 2;
  
  
  optional string schemeId = 3;
  
  
  optional string schemeVersionId = 4;
  
  
  optional string value = 5;
  
}

/// Get request for Identifier
message GetIdentifierRequest {
  
    // Entity UUID
  string id = 1;
  
}

/// Delete request for Identifier
message DeleteIdentifierRequest {
  
    // Entity UUID
  string id = 1;
  
}

/// List request for Identifier
message ListIdentifierRequest {
  
    // Number of items per page
  optional int32 page_size = 1;
  
    // Pagination token
  optional string page_token = 2;
  
    // Additional field filters
  repeated FilterClause filters = 5;
  
}

/// List response for Identifier
message ListIdentifierResponse {
  
  
  repeated Identifier data = 1;
  
    // Total number of items
  int32 total = 2;
  
    // Pagination token for next page
  optional string next_page_token = 3;
  
}



// ── Identifier Service ──────────────────────────────────────────
service IdentifierService {
  
  // Create a new entity
  rpc Create(CreateIdentifierRequest) returns (Identifier);
  
  // Get an entity by ID
  rpc Get(GetIdentifierRequest) returns (Identifier);
  
  // Update an existing entity
  rpc Update(UpdateIdentifierRequest) returns (Identifier);
  
  // Delete an entity by ID
  rpc Delete(DeleteIdentifierRequest) returns (google.protobuf.Empty);
  
  // List entities with pagination
  rpc List(ListIdentifierRequest) returns (ListIdentifierResponse);
  
}
