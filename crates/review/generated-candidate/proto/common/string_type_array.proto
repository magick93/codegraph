syntax = "proto3";
package common;

import "google/protobuf/timestamp.proto";

import "shared.proto";
option go_package = "common/;common";




/// StringTypeArray entity
message StringTypeArray {
  
    // Unique identifier (UUID)
  string id = 1;
  
    // Creation timestamp
  optional google.protobuf.Timestamp created_at = 998;
  
    // Last update timestamp
  optional google.protobuf.Timestamp updated_at = 999;
  
}

/// Create request for StringTypeArray
message CreateStringTypeArrayRequest {
  
}

/// Update request for StringTypeArray
message UpdateStringTypeArrayRequest {
  
    // Unique identifier (UUID)
  string id = 1;
  
}

/// Get request for StringTypeArray
message GetStringTypeArrayRequest {
  
    // Entity UUID
  string id = 1;
  
}

/// Delete request for StringTypeArray
message DeleteStringTypeArrayRequest {
  
    // Entity UUID
  string id = 1;
  
}

/// List request for StringTypeArray
message ListStringTypeArrayRequest {
  
    // Number of items per page
  optional int32 page_size = 1;
  
    // Pagination token
  optional string page_token = 2;
  
    // Additional field filters
  repeated FilterClause filters = 5;
  
}

/// List response for StringTypeArray
message ListStringTypeArrayResponse {
  
  
  repeated StringTypeArray data = 1;
  
    // Total number of items
  int32 total = 2;
  
    // Pagination token for next page
  optional string next_page_token = 3;
  
}



// ── StringTypeArray Service ──────────────────────────────────────────
service StringTypeArrayService {
  
  // Create a new entity
  rpc Create(CreateStringTypeArrayRequest) returns (StringTypeArray);
  
  // Get an entity by ID
  rpc Get(GetStringTypeArrayRequest) returns (StringTypeArray);
  
  // Update an existing entity
  rpc Update(UpdateStringTypeArrayRequest) returns (StringTypeArray);
  
  // Delete an entity by ID
  rpc Delete(DeleteStringTypeArrayRequest) returns (google.protobuf.Empty);
  
  // List entities with pagination
  rpc List(ListStringTypeArrayRequest) returns (ListStringTypeArrayResponse);
  
}
